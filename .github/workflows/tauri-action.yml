name: 'publish'

on:
  push:
    branches:
      - release

# 此工作流将在每次推送到 `release` 分支时触发，以创建或更新 GitHub release，构建应用程序，并将构建产物上传到 release。

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # 用于基于 Arm 的 mac（M1 及以上）。
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # 用于基于 Intel 的 mac。
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # 对于 Tauri v1，您可以将其替换为 ubuntu-20.04。
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # 这些目标仅用于 macos 运行器，因此放在 `if` 条件中以稍微加速 windows 和 linux 的构建。
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # 这里必须与上面定义的平台值匹配。
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libappindicator3-dev
        # remove: libwebkit2gtk-4.0-dev libappindicator3-dev | libayatana-appindicator3-dev libssl-dev libxdo-dev build-essential
        # webkitgtk 4.0 适用于 Tauri v1 - webkitgtk 4.1 适用于 Tauri v2。
        # 您可以移除不适用于您的应用程序的那个，以稍微加速工作流。

      - name: install frontend dependencies
        run: npm install # 根据您使用的包管理器，将其更改为 npm、pnpm 或 bun。

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # 该动作会自动将 __VERSION__ 替换为应用程序版本。
          releaseName: 'App v__VERSION__'
          releaseBody: '请下载资源以下载并安装此版本。'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
